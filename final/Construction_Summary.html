<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Buildings & Upgrades — Crop Shooter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Unbounded:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --t:.22s }

[data-theme="dark"] {
  --bg:   #090d09; --bg1:#0d130d; --bg2:#111811; --bg3:#172017; --bg4:#1e2c1e;
  --bd:   #233223; --bd2:#2e4230; --bd3:#3a5440;
  --acc:  #6dff4a; --acc2:#f5c842; --acc3:#4ab8ff; --acc4:#c07dff; --acc5:#ff7450;
  --tx:   #d5e8d0; --tx2:#8aaa88; --tx3:#4d6b4d;
  --sh:   rgba(109,255,74,.05); --sh2:rgba(109,255,74,.12);
  --cglow:0 0 0 1px var(--bd),inset 0 1px 0 rgba(109,255,74,.05);
  --tglow:0 2px 14px rgba(109,255,74,.22);
  --bbg:  #1a271a; --btx:var(--acc);
  --grid-op:.15;
}
[data-theme="light"] {
  --bg:   #f0f4ed; --bg1:#e8ede4; --bg2:#dfe7d9; --bg3:#d5e0ce; --bg4:#c9d9c1;
  --bd:   #b5c9ad; --bd2:#a0b896; --bd3:#8aa37e;
  --acc:  #1a7a00; --acc2:#936800; --acc3:#0068b0; --acc4:#6828b8; --acc5:#b82800;
  --tx:   #162814; --tx2:#446040; --tx3:#82a07c;
  --sh:   rgba(26,122,0,.05); --sh2:rgba(26,122,0,.10);
  --cglow:0 0 0 1px var(--bd),0 2px 4px rgba(0,0,0,.07);
  --tglow:0 2px 8px rgba(26,122,0,.14);
  --bbg:  #c4d9bb; --btx:var(--acc);
  --grid-op:.12;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:var(--bg);color:var(--tx);
  font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;
  transition:background var(--t),color var(--t);min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(var(--bd) 1px,transparent 1px),
    linear-gradient(90deg,var(--bd) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:var(--grid-op);
}

.wrap{position:relative;z-index:1;padding:28px 32px 100px;max-width:1640px;margin:0 auto}

/* ── HEADER ── */
.hd{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.hd-left{flex:1}
.hd-eye{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--acc);margin-bottom:5px;
}
.hd h1{
  font-family:'Unbounded',sans-serif;font-size:21px;font-weight:900;
  letter-spacing:-1px;color:var(--tx);line-height:1;
}
.hd h1 em{color:var(--acc);font-style:normal}
.hd-sub{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--tx3);margin-top:6px;letter-spacing:.5px;
}
.theme-btn{
  width:36px;height:36px;background:var(--bg3);
  border:1px solid var(--bd);color:var(--tx2);
  cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:border-color var(--t),color var(--t),background var(--t);
  flex-shrink:0;line-height:1;
}
.theme-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--bg4)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;margin-bottom:28px;flex-wrap:wrap}
.tab{
  padding:8px 18px;
  font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--tx3);cursor:pointer;
  background:var(--bg2);border:1px solid var(--bd);
  transition:color var(--t),background var(--t),border-color var(--t),box-shadow var(--t);
  white-space:nowrap;position:relative;
}
.tab::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:2px;background:var(--acc);
  transform:scaleX(0);transition:transform .15s;
}
.tab:hover{color:var(--tx);background:var(--bg3)}
.tab.active{color:var(--acc);background:var(--bg3);border-color:var(--bd2);box-shadow:var(--tglow)}
.tab.active::after{transform:scaleX(1)}
.view{display:none}.view.active{display:block}

/* ── SECTION LABEL ── */
.sec-lbl{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--tx3);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── BUILDING GRID ── */
.building-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(430px,1fr));
  gap:14px;margin-bottom:36px;
}

/* ── BUILDING CARD ── */
.bcard{
  background:var(--bg1);box-shadow:var(--cglow);
  overflow:hidden;position:relative;
  transition:box-shadow var(--t);
}
.bcard::before{
  content:'';position:absolute;top:0;right:0;
  width:10px;height:10px;background:var(--bg);
  clip-path:polygon(0 0,100% 0,100% 100%);z-index:2;
  transition:background var(--t);
}
.bcard:hover{box-shadow:var(--cglow),0 0 0 1px var(--bd2)}

.bcard-head{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;background:var(--bg2);
  border-bottom:1px solid var(--bd);
}
.bcard-ic{width:52px;height:52px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.bcard-ic-placeholder{
  width:52px;height:52px;background:var(--bg);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.bcard-meta{flex:1;min-width:0}
.bcard-name{
  font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;
  color:var(--tx);margin-bottom:6px;
}
.bcard-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.4px;
  padding:2px 6px;border:1px solid;
}
.pill-day    {color:var(--acc3);border-color:rgba(74,184,255,.3);background:rgba(74,184,255,.07)}
.pill-free   {color:var(--tx3);border-color:var(--bd);background:var(--bg)}
.pill-cost   {color:var(--acc2);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.07)}
.pill-demolish{color:var(--acc5);border-color:rgba(255,116,80,.3);background:rgba(255,116,80,.07)}

.bcard-body{padding:12px 16px}
.bcard-desc{font-size:10px;color:var(--tx2);line-height:1.7;margin-bottom:10px}

/* ── UPGRADES ── */
.upg-list{display:flex;flex-direction:column;gap:3px}
.upg-item{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;background:var(--bg);border:1px solid var(--bd);
  transition:border-color var(--t),background var(--t);
}
.upg-item:hover{border-color:var(--bd2);background:var(--bg2)}
.upg-ic{width:32px;height:32px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.upg-ic-placeholder{
  width:32px;height:32px;background:var(--bg2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;flex-shrink:0;color:var(--tx3);
}
.upg-num{font-family:'DM Mono',monospace;font-size:8px;color:var(--tx3);flex-shrink:0;width:14px;text-align:center}
.upg-info{flex:1;min-width:0}
.upg-name{font-size:10px;font-weight:600;color:var(--tx);margin-bottom:1px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.upg-desc{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx2);line-height:1.5}
.upg-right{flex-shrink:0;text-align:right}
.upg-cost{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--acc2);white-space:nowrap}
.upg-day{font-family:'DM Mono',monospace;font-size:8px;color:var(--tx3)}
.granumz{color:var(--acc2);font-weight:600;font-family:'DM Mono',monospace}

/* ── TAGS ── */
.tag{
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.8px;
  text-transform:uppercase;padding:1px 4px;border:1px solid;
}
.tag-milestone  {color:var(--acc2);border-color:rgba(245,200,66,.4);background:rgba(245,200,66,.08)}
.tag-blueprint  {color:var(--acc3);border-color:rgba(74,184,255,.4);background:rgba(74,184,255,.08)}
.tag-achievement{color:var(--acc4);border-color:rgba(192,125,255,.4);background:rgba(192,125,255,.08)}

/* ── OVERVIEW TABLE ── */
.ov-wrap{overflow-x:auto}
.ov-table{width:100%;border-collapse:collapse;font-size:10px}
.ov-table thead tr{background:var(--bg2);border-bottom:2px solid var(--acc)}
.ov-table th{
  text-align:left;padding:9px 12px;
  font-family:'Unbounded',sans-serif;
  font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--tx3);
}
.ov-table td{padding:7px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
.ov-table tbody tr:hover td{background:var(--sh)}
.ov-ic{width:26px;height:26px;object-fit:contain;image-rendering:pixelated}
.ov-name{font-weight:600;color:var(--tx);font-size:11px}
.ov-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--tx3)}
.ov-cost{font-family:'DM Mono',monospace;color:var(--acc2)}
.ov-day{font-family:'DM Mono',monospace;color:var(--acc3)}
.ov-effect{color:var(--tx2);font-size:9px;max-width:220px}

/* ── FAB GRID ── */
.fab-outer{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(480px,1fr));
  gap:16px;margin-bottom:16px;
}
.fab-cat{background:var(--bg1);box-shadow:var(--cglow);overflow:hidden}
.fab-cat-head{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);
}
.fab-cat-ic{width:36px;height:36px;object-fit:contain;image-rendering:pixelated;flex-shrink:0}
.fab-cat-nb{flex:1}
.fab-cat-name{
  font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;
  color:var(--acc);margin-bottom:2px;
}
.fab-cat-desc{font-size:9px;color:var(--tx2);line-height:1.5}
.fab-cat-body{padding:12px}

/* ── GADGET CARDS ── */
.gadget-grid{display:flex;flex-direction:column;gap:8px}
.gadget-card{background:var(--bg);border:1px solid var(--bd);overflow:hidden}
.gadget-head{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);
}
.gadget-ic{width:44px;height:44px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.gadget-ic-ph{
  width:44px;height:44px;background:var(--bg);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.gadget-title-group{flex:1;min-width:0}
.gadget-name{
  font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;
  color:var(--tx);margin-bottom:4px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.gadget-meta{
  font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);
  display:flex;gap:10px;flex-wrap:wrap;
}
.base-stats{
  display:flex;flex-wrap:wrap;gap:4px;
  padding:7px 12px;border-bottom:1px solid var(--bd);
}
.stat-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--bg3);border:1px solid var(--bd);
  padding:2px 7px;font-family:'DM Mono',monospace;font-size:8px;
}
.stat-k{color:var(--tx3);text-transform:uppercase;letter-spacing:.4px}
.stat-v{color:var(--acc);font-weight:500}

.lv-list{padding:2px 0}
.lv-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:7px 12px;border-bottom:1px solid var(--bd);
  transition:background var(--t);
}
.lv-row:hover{background:var(--sh)}
.lv-row:last-child{border-bottom:none}
.lv-ic{width:30px;height:30px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.lv-badge{
  min-width:28px;height:18px;
  background:var(--bbg);color:var(--btx);border:1px solid var(--bd2);
  font-family:'DM Mono',monospace;font-size:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
}
.lv-info{flex:1;min-width:0}
.lv-desc{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx);margin-bottom:4px;line-height:1.5}
.lv-stats{display:flex;flex-wrap:wrap;gap:4px}
.lv-cost{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--acc2);font-weight:500;white-space:nowrap;flex-shrink:0;margin-top:2px;
}

/* ── FAB DIVIDER ── */
.fab-divider{
  height:1px;background:var(--bd);
  margin:16px 0;position:relative;
}
.fab-divider::before{
  content:'SCIENCE LAB BUILDINGS';
  position:absolute;top:50%;left:0;transform:translateY(-50%);
  background:var(--bg);padding:0 8px;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--tx3);
}
</style>
</head>
<body>
<div class="wrap">
        <button onclick="window.location.href='https://xuanvufsv.github.io'"
        style="display:inline-flex; align-items:center; margin-bottom: 5px; padding:5px 10px; background-color:#e74c3c; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">
        Crop🍅Shooter
      </button>
<div class="hd">
  <div class="hd-left">
    <div class="hd-eye">GDD Reference · v1.0</div>
    <h1>Buildings <em>&amp;</em> Upgrades</h1>
    <div class="hd-sub">CROP SHOOTER · All costs in Granumz (G)</div>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="sw('overview')">Overview</div>
  <div class="tab" onclick="sw('base')">Base Construction</div>
  <div class="tab" onclick="sw('farming')">Farming</div>
  <div class="tab" onclick="sw('fabricate')">Fabricate Gadgets</div>
</div>

<div class="view active" id="view-overview">
  <div class="ov-wrap">
    <table class="ov-table">
      <thead><tr>
        <th></th><th>Building / Gadget</th><th>Category</th>
        <th>Blueprint</th><th>Unlock</th><th>Upgrades</th><th>Key Effect</th>
      </tr></thead>
      <tbody id="ovBody"></tbody>
    </table>
  </div>
</div>

<div class="view" id="view-base">
  <div class="sec-lbl">Base Construction</div>
  <div class="building-grid" id="baseGrid"></div>
</div>

<div class="view" id="view-farming">
  <div class="sec-lbl">Farming Construction</div>
  <div class="building-grid" id="farmGrid"></div>
</div>

<div class="view" id="view-fabricate">
  <div class="sec-lbl">Gadget Categories</div>
  <div class="fab-outer" id="fabGrid"></div>
  <div class="fab-divider"></div>
  <div class="building-grid" id="fabBuildGrid"></div>
</div>

</div>

function toggleTheme(){
  const h=document.documentElement;
  const dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀';
}

/* ── RENDER ── */
function sw(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${id}"]`).classList.add('active');
  document.getElementById('view-'+id).classList.add('active');
}

function mkTag(t){return t?`<span class="tag tag-${t}">${t}</span>`:''}

function renderUpgrade(u,i){
  const costHtml=u.cost>0
    ?`<span class="granumz">${u.cost.toLocaleString()}G</span>`
    :(u.tag==='achievement'?'<span style="color:var(--acc4)">Achievement</span>':'<span style="color:var(--tx3)">Free</span>');
  const dayHtml=u.day>0?`<div class="upg-day">Day ${u.day}</div>`:'';
  return`<div class="upg-item">
  <div class="upg-num">${i+1}</div>
  ${u.ic?img(u.ic,'upg-ic'):'<div class="upg-ic-placeholder">—</div>'}
  <div class="upg-info">
    <div class="upg-name">${mkTag(u.tag)}${u.name}</div>
    <div class="upg-desc">${u.desc}</div>
  </div>
  <div class="upg-right"><div class="upg-cost">${costHtml}</div>${dayHtml}</div>
</div>`;
}

function renderCard(b){
  const ic=b.ic?img(b.ic,'bcard-ic'):'<div class="bcard-ic-placeholder">🏗</div>';
  const bp=b.blueprintCost>0
    ?`<span class="pill pill-cost">${b.blueprintCost.toLocaleString()}G blueprint</span>`
    :`<span class="pill pill-free">No blueprint</span>`;
  const dem=b.demolish?`<span class="pill pill-demolish">Demolish</span>`:'';
  return`<div class="bcard">
  <div class="bcard-head">${ic}
    <div class="bcard-meta">
      <div class="bcard-name">${b.name}</div>
      <div class="bcard-pills"><span class="pill pill-day">Day ${b.day}</span>${bp}${dem}</div>
    </div>
  </div>
  <div class="bcard-body">
    <div class="bcard-desc">${b.desc}</div>
    ${b.upgrades.length?`<div class="upg-list">${b.upgrades.map((u,i)=>renderUpgrade(u,i)).join('')}</div>`:''}
  </div>
</div>`;
}

const baseCards=BUILDINGS.filter(b=>b.cat==='base');
const farmCards=BUILDINGS.filter(b=>b.cat==='farming');
const fabCards=BUILDINGS.filter(b=>b.cat==='fabricate');

document.getElementById('baseGrid').innerHTML=baseCards.map(renderCard).join('');
document.getElementById('farmGrid').innerHTML=farmCards.map(renderCard).join('');
document.getElementById('fabBuildGrid').innerHTML=fabCards.map(renderCard).join('');

document.getElementById('fabGrid').innerHTML=FAB_CATS.map(cat=>{
  const gadgetCards=cat.gadgets.map(g=>{
    const costHtml=g.cost>0
      ?`<span class="granumz">${g.cost.toLocaleString()}G</span>`
      :(g.tag==='blueprint'?'<span style="color:var(--acc3)">Blueprint only</span>':'<span style="color:var(--tx3)">Free</span>');
    const dem=g.demolish?`<span class="pill pill-demolish" style="font-size:7px;padding:1px 5px">Demolish</span>`:'';
    const baseStats=g.base?Object.entries(g.base).map(([k,v])=>
      `<span class="stat-chip"><span class="stat-k">${k.replace(/_/g,' ')}</span><span class="stat-v">${v}</span></span>`
    ).join(''):'';
    const levelRows=(g.levels||[]).map(lv=>{
      const uc=lv.upgrade_cost>0?`<span class="granumz">${lv.upgrade_cost.toLocaleString()}G</span>`:'<span style="color:var(--tx3)">—</span>';
      const lvStats=Object.entries(lv)
        .filter(([k])=>!['lv','ic','cost','upgrade_cost','desc'].includes(k))
        .map(([k,v])=>`<span class="stat-chip"><span class="stat-k">${k.replace(/_/g,' ')}</span><span class="stat-v">${v}</span></span>`)
        .join('');
      return`<div class="lv-row">
      ${img(lv.ic,'lv-ic')}
      <div class="lv-badge">Lv${lv.lv}</div>
      <div class="lv-info"><div class="lv-desc">${lv.desc}</div><div class="lv-stats">${lvStats}</div></div>
      <div class="lv-cost">${uc}</div>
    </div>`;
    }).join('');
    return`<div class="gadget-card">
    <div class="gadget-head">
      ${g.ic?img(g.ic,'gadget-ic'):'<div class="gadget-ic-ph">⚙</div>'}
      <div class="gadget-title-group">
        <div class="gadget-name">${mkTag(g.tag)}${g.name}${dem}</div>
        <div class="gadget-meta"><span>Day ${g.day}</span><span>${costHtml}</span></div>
      </div>
    </div>
    ${baseStats?`<div class="base-stats">${baseStats}</div>`:''}
    <div class="lv-list">${levelRows}</div>
  </div>`;
  }).join('');
  return`<div class="fab-cat">
  <div class="fab-cat-head">
    ${img(cat.ic,'fab-cat-ic')}
    <div class="fab-cat-nb">
      <div class="fab-cat-name">${cat.name}</div>
      <div class="fab-cat-desc">${cat.desc}</div>
    </div>
  </div>
  <div class="fab-cat-body"><div class="gadget-grid">${gadgetCards}</div></div>
</div>`;
}).join('');
