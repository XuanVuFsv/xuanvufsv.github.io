<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Buildings & Upgrades — Crop Shooter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c08;--bg2:#0e150e;--bg3:#141e14;--bd:#1e301e;--bd2:#2a422a;
  --g:#7fff5f;--y:#ffcf3f;--r:#ff6b3f;--b:#3fbfff;--p:#bf7fff;--o:#ff9f3f;
  --w:#deeade;--mu:#4a664a;
  --fh:'Syne',sans-serif;--fm:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--w);font-family:var(--fm);font-size:13px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(127,255,95,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(127,255,95,.012) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;padding:28px 32px 80px;max-width:1600px;margin:0 auto}
.hd{display:flex;align-items:baseline;gap:14px;margin-bottom:20px;border-bottom:1px solid var(--bd);padding-bottom:14px}
.hd h1{font-family:var(--fh);font-size:24px;font-weight:800;letter-spacing:-1px;color:var(--g)}
.hd p{color:var(--mu);font-size:10px}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.tab{padding:10px 20px;font-size:11px;font-family:var(--fh);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab:hover{color:var(--w)}.tab.active{color:var(--g);border-bottom-color:var(--g)}
.view{display:none}.view.active{display:block}

/* SECTION */
.section-title{font-family:var(--fh);font-size:15px;font-weight:800;color:var(--g);letter-spacing:-0.5px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.section-title .sec-ic{width:22px;height:22px;object-fit:contain}

/* BUILDING GRID */
.building-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:18px;margin-bottom:36px}

/* BUILDING CARD */
.bcard{background:var(--bg2);border:1px solid var(--bd);padding:0;overflow:hidden}
.bcard-head{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--bg3);border-bottom:1px solid var(--bd)}
.bcard-ic{width:56px;height:56px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.bcard-ic-placeholder{width:56px;height:56px;background:var(--bg);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.bcard-info{flex:1}
.bcard-name{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--w);margin-bottom:4px}
.bcard-sub{font-size:10px;color:var(--mu)}
.bcard-cost{font-size:11px;color:var(--y);font-weight:700;margin-left:auto;white-space:nowrap;text-align:right}
.bcard-body{padding:14px 18px}
.bcard-desc{font-size:10px;line-height:1.6;color:var(--mu);line-height:1.7;margin-bottom:8px}

/* UPGRADE LIST */
.upg-list{display:flex;flex-direction:column;gap:4px}
.upg-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg);border:1px solid var(--bd);transition:border-color .1s}
.upg-item:hover{border-color:var(--bd2)}
.upg-ic{width:36px;height:36px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.upg-ic-placeholder{width:36px;height:36px;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.upg-info{flex:1}
.upg-name{font-size:11px;color:var(--w);font-weight:700;margin-bottom:1px}
.upg-desc{font-size:10px;color:var(--mu);line-height:1.5}
.upg-cost{font-size:10px;color:var(--y);white-space:nowrap;text-align:right;flex-shrink:0}
.upg-day{font-size:7px;color:var(--mu);text-align:right}
.upg-tag{display:inline-block;font-size:7px;padding:1px 4px;margin-right:3px;border-radius:1px}
.tag-milestone{background:rgba(255,207,63,.12);color:var(--y);border:1px solid rgba(255,207,63,.3)}
.tag-blueprint{background:rgba(63,191,255,.1);color:var(--b);border:1px solid rgba(63,191,255,.3)}
.tag-achievement{background:rgba(191,127,255,.1);color:var(--p);border:1px solid rgba(191,127,255,.3)}
.upg-num{font-size:8px;color:var(--mu);flex-shrink:0;width:16px;text-align:center}

/* FABRICATE CATEGORIES */
.fab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.fab-cat{background:var(--bg2);border:1px solid var(--bd);padding:14px}
.fab-cat-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.fab-cat-ic{width:32px;height:32px;object-fit:contain}
.fab-cat-name{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--w)}

/* OVERVIEW TABLE */
.ov-table{width:100%;border-collapse:collapse;font-size:10px}
.ov-table th{text-align:left;padding:8px 10px;background:var(--bg3);color:var(--g);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--bd);font-family:var(--fh)}
.ov-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.ov-table tr:hover td{background:rgba(127,255,95,.02)}
.ov-table .ov-ic{width:24px;height:24px;object-fit:contain;image-rendering:pixelated}
.ov-table .ov-name{color:var(--w);font-weight:700}
.ov-table .ov-cat{color:var(--mu);font-size:8px}
.ov-table .ov-cost{color:var(--y)}
.ov-table .ov-day{color:var(--b)}
.ov-table .ov-effect{color:var(--mu);font-size:9px}

.granumz{color:var(--y);font-weight:700}

/* GADGET CARDS */
.gadget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-top:4px}
.gadget-card{background:var(--bg);border:1px solid var(--bd);overflow:hidden}
.gadget-head{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border-bottom:1px solid var(--bd)}
.gadget-ic{width:48px;height:48px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.gadget-ic-ph{width:48px;height:48px;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.gadget-title-group{flex:1;min-width:0}
.gadget-name{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--w);margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.gadget-meta{font-size:9px;color:var(--mu)}
.base-stats{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px;border-bottom:1px solid var(--bd)}
.stat-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--bd);padding:2px 7px;font-size:8px}
.stat-chip.sm{font-size:8px;padding:2px 5px}
.stat-k{color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.stat-v{color:var(--g);font-weight:700}
/* LEVEL ROWS */
.lv-list{padding:8px 0}
.lv-row{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd)}
.lv-row:last-child{border-bottom:none}
.lv-ic{width:34px;height:34px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.lv-badge{min-width:28px;height:18px;background:var(--bd2);color:var(--g);font-size:8px;font-weight:700;font-family:var(--fh);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.lv-info{flex:1;min-width:0}
.lv-desc{font-size:9px;color:var(--w);margin-bottom:4px;line-height:1.5}
.lv-stats{display:flex;flex-wrap:wrap;gap:4px}
.lv-cost{font-size:10px;color:var(--y);font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
/* FAB CAT updated head */
.fab-cat-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.fab-cat-desc{font-size:9px;color:var(--mu);flex:1;line-height:1.5}
.fab-cat-name{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--g);white-space:nowrap}
.fab-cat-ic{width:32px;height:32px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
</style>
</head>
<body>
<div class="wrap">
<div class="hd">
  <h1>Buildings &amp; Upgrades</h1>
  <p>Crop Shooter — GDD Reference · All costs in Granumz (G)</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="sw('overview')">Overview</div>
  <div class="tab" onclick="sw('base')">Base Construction</div>
  <div class="tab" onclick="sw('farming')">Farming</div>
  <div class="tab" onclick="sw('fabricate')">Fabricate Gadgets</div>

<!-- OVERVIEW -->

<table class="ov-table">
<thead><tr><th></th><th>Building</th><th>Category</th><th>Blueprint Cost</th><th>Unlock Day</th><th>Upgrades</th><th>Key Effect</th></tr></thead>

<!-- FARMING -->
<div class="view" id="view-farming">
<div class="building-grid" id="farmGrid"></div>
</div>

<!-- FABRICATE -->
<div class="view" id="view-fabricate">
<div class="fab-grid" id="fabGrid"></div>
<div class="building-grid" id="fabBuildGrid"></div>
</div>

</div>

// ── BUILD DOM ──────────────────────────────────────────────────────────────
function sw(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${id}"]`).classList.add('active');
  document.getElementById('view-'+id).classList.add('active');
}

function renderUpgrade(u, idx){
  const tagHtml = u.tag ? `<span class="upg-tag tag-${u.tag}">${u.tag}</span>` : '';
  const costHtml = u.cost > 0 ? `<span class="granumz">${u.cost.toLocaleString()}G</span>` : (u.tag==='achievement'?'<span style="color:var(--p)">Achievement</span>':'Free');
  return `<div class="upg-item">
    <div class="upg-num">${idx+1}</div>
    ${u.ic ? img(u.ic,'upg-ic') : '<div class="upg-ic-placeholder">·</div>'}
    <div class="upg-info">
      <div class="upg-name">${tagHtml}${u.name}</div>
      <div class="upg-desc">${u.desc}</div>
    </div>
    <div>
      <div class="upg-cost">${costHtml}</div>
      <div class="upg-day">Day ${u.day}</div>
    </div>
  </div>`;
}

function renderCard(b){
  const icHtml = b.ic ? img(b.ic,'bcard-ic') : '<div class="bcard-ic-placeholder">🏗</div>';
  const bpCost = b.blueprintCost > 0 ? `<span class="granumz">${b.blueprintCost}G</span> blueprint` : (b.blueprintCost===0&&b.day===1?'Available from start':'Free');
  const demolishTag = b.demolish ? '<span style="font-size:7px;color:var(--r);margin-left:6px">requires demolish option</span>' : '';
  return `<div class="bcard">
    <div class="bcard-head">
      ${icHtml}
      <div class="bcard-info">
        <div class="bcard-name">${b.name}${demolishTag}</div>
        <div class="bcard-sub">Day ${b.day} · ${bpCost}</div>
      </div>
    </div>
    <div class="bcard-body">
      <div class="bcard-desc">${b.desc}</div>
      ${b.upgrades.length ? `<div class="upg-list">${b.upgrades.map((u,i)=>renderUpgrade(u,i)).join('')}</div>` : ''}
    </div>
  </div>`;
}

    const tagHtml = g.tag ? `<span class="upg-tag tag-${g.tag}">${g.tag}</span>` : '';
    const costHtml = g.cost > 0 ? `<span class="granumz">${g.cost}G</span>` : (g.tag==='blueprint' ? '<span style="color:var(--b)">Blueprint</span>' : '<span style="color:var(--mu)">Free</span>');

    // Base stats chips
    const baseStats = g.base ? Object.entries(g.base).map(([k,v]) =>
      `<span class="stat-chip"><span class="stat-k">${k.replace(/_/g,' ')}</span><span class="stat-v">${v}</span></span>`
    ).join('') : '';

    // Level rows

      const upgCost = lv.upgrade_cost > 0 ? `<span class="granumz">${lv.upgrade_cost}G</span>` : '<span style="color:var(--mu)">—</span>';
      const lvStats = Object.entries(lv)
        .filter(([k])=>!['lv','ic','cost','upgrade_cost','desc'].includes(k))
        .map(([k,v])=>`<span class="stat-chip sm"><span class="stat-k">${k.replace(/_/g,' ')}</span><span class="stat-v">${v}</span></span>`)
        .join('');
      return `<div class="lv-row">
        ${img(lv.ic,'lv-ic')}
        <div class="lv-badge">Lv${lv.lv}</div>
        <div class="lv-info">
          <div class="lv-desc">${lv.desc}</div>
          <div class="lv-stats">${lvStats}</div>
        </div>
        <div class="lv-cost">${upgCost}</div>
      </div>`;
    }).join('');

    return `<div class="gadget-card">
      <div class="gadget-head">
        ${g.ic ? img(g.ic,'gadget-ic') : '<div class="gadget-ic-ph">⚙</div>'}

          <div class="gadget-name">${tagHtml}${g.name}</div>
          <div class="gadget-meta">Unlock Day ${g.day} · ${costHtml}</div>
        </div>
      </div>
      ${baseStats ? `<div class="base-stats">${baseStats}</div>` : ''}
      <div class="lv-list">${levelRows}</div>
    </div>`;
  }).join('');

  return `<div class="fab-cat">
    <div class="fab-cat-head">${img(cat.ic,'fab-cat-ic')}<div class="fab-cat-name">${cat.name}</div><div class="fab-cat-desc">${cat.desc}</div></div>
    <div class="gadget-grid">${gadgetCards}</div>
  </div>`;
}).join('');
